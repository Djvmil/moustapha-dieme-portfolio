<section class="section" id="expertise">
  <div class="section-heading">
    <p class="section-eyebrow">Expertise</p>
    <h3>Ce que j’apporte sur un produit mobile</h3>
  </div>

  <div class="services-grid">
    @for (service of services; track service.title) {
      <article class="panel service-card glass-panel">
        <p class="card-kicker">{{ service.title }}</p>
        <p class="service-card__text">{{ service.description }}</p>
        <div class="tag-list">
          @for (item of service.items; track item) {
            <span class="tag tag--soft">{{ item }}</span>
          }
        </div>
      </article>
    }
  </div>
</section>
