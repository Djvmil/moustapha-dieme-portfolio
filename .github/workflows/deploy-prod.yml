name: CD — Deploy Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag to deploy (e.g. v0.1.0, latest)'
        required: true
        default: 'latest'
      services:
        description: 'Services to deploy (comma-separated: backend,admin,storefront,portfolio) or "all"'
        required: true
        default: 'portfolio'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: deployment_env

    steps:
      - name: Resolve version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /opt/synkro/compose
            export TAG=${{ steps.resolve.outputs.VERSION }}
            SERVICES="${{ github.event.inputs.services || 'portfolio' }}"
            echo "🚀 Deploying tag=$TAG services=$SERVICES"

            if [ "$SERVICES" = "all" ]; then
              docker compose pull
              docker compose up -d --remove-orphans
            else
              for svc in $(echo "$SERVICES" | tr ',' ' '); do
                echo "📦 Deploying $svc..."
                docker compose pull "$svc"
                docker compose up -d --no-deps "$svc"
              done
            fi

            sleep 10
            echo "📋 Service status:"
            docker compose ps